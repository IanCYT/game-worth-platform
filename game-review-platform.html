            gap: 0.5rem;
            margin-bottom: 1rem;

        .filter-btn {

            border: 1px solid rgba(51, 65, 85, 0.5);

        }

        .platform-btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: 1px solid rgba(51, 65, 85, 0.5);
            background: rgba(30, 41, 59, 0.5);
            color: #cbd5e1;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        body.light-mode .platform-btn {
            background: rgba(226, 232, 240, 0.8);
            color: #475569;
            border: 1px solid rgba(100, 116, 139, 0.3);
        }

        .platform-btn:hover {
            background: rgba(51, 65, 85, 0.5);
        }

        body.light-mode .platform-btn:hover {
            background: rgba(203, 213, 225, 0.8);

        .sort-btn {

            gap: 0.5rem;

            font-weight: 600;
            border: 1px solid rgba(51, 65, 85, 0.5);
            background: rgba(30, 41, 59, 0.5);
            color: #94a3b8;

            transition: all 0.15s ease;
        }

        .sort-btn:hover {
            background: rgba(51, 65, 85, 0.5);

            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            border: 1px solid rgba(51, 65, 85, 0.5);
            background: rgba(30, 41, 59, 0.5);
            color: #cbd5e1;

        .game-card {

            animation: fadeInUp 0.3s ease-out;
            will-change: transform;
        }

        @keyframes fadeInUp {
            from {

            to {
                opacity: 1;
                transform: translateY(0);
            }

        .game-card.delay-1 { animation-delay: 0.05s; }
        .game-card.delay-2 { animation-delay: 0.1s; }
        .game-card.delay-3 { animation-delay: 0.15s; }
        .game-card.delay-4 { animation-delay: 0.2s; }
        .game-card.delay-5 { animation-delay: 0.25s; }
        .game-card.delay-6 { animation-delay: 0.3s; }
        .game-card.delay-7 { animation-delay: 0.35s; }
        .game-card.delay-8 { animation-delay: 0.4s; }
        .game-card.delay-9 { animation-delay: 0.45s; }
        .game-card.delay-10 { animation-delay: 0.5s; }

        .card-inner {

        .game-card:hover .card-inner {

        body.light-mode .game-card:hover .card-inner {
            border-color: rgba(100, 116, 139, 0.5);

        .verdict-badge {

            top: 0;
            right: 0;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            color: white;
            background-size: 100% 100%;
        }

        .verdict-worth {

        body.light-mode .game-card:hover .game-title {
            color: #a855f7;
        }

        .game-genre {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        body.light-mode .game-genre {
            color: #64748b;
        }

        .game-platform {
            font-size: 0.875rem;
            color: #06b6d4;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        body.light-mode .game-platform {
            color: #0891b2;
        }

        .game-description {
            color: #cbd5e1;
            font-size: 0.875rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        body.light-mode .game-description {
            color: #475569;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tag {
            padding: 0.25rem 0.5rem;
            background: rgba(30, 41, 59, 0.6);
            color: #06b6d4;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 0.25rem;
            transition: background 0.3s ease, color 0.3s ease;
        }

        body.light-mode .tag {
            background: rgba(203, 213, 225, 0.6);
            color: #0891b2;
        }

        .rating-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
            transition: border-color 0.3s ease;
        }

        body.light-mode .rating-row {
            border-bottom: 1px solid rgba(100, 116, 139, 0.2);
        }

        .stars {
            display: flex;
            gap: 0.25rem;
        }

        .star {
            width: 1rem;
            height: 1rem;
        }

        .star.filled {
            color: #facc15;
        }

        .star.empty {
            color: #475569;
        }

        .rating-number {
            font-size: 1.125rem;
            font-weight: 900;
            color: white;
            margin-left: 0.5rem;
        }

        .review-count {
            font-size: 0.75rem;
            color: #64748b;
            transition: color 0.3s ease;
        }

        body.light-mode .review-count {
            color: #94a3b8;
        }

        .price-label {
            color: #94a3b8;
            font-size: 0.875rem;
            transition: color 0.3s ease;
        }

        body.light-mode .price-label {
            color: #64748b;
        }

        .price-value {
            font-size: 1.125rem;
            font-weight: 900;
            color: #06b6d4;
            transition: color 0.3s ease;
        }

        body.light-mode .price-value {
            color: #0891b2;
        }

        .no-results {
            text-align: center;
            padding: 5rem 1.5rem;
            color: #94a3b8;
            font-size: 1.125rem;
            transition: color 0.3s ease;
        }

        body.light-mode .no-results {
            color: #64748b;
        }

        footer {
            border-top: 1px solid rgba(51, 65, 85, 0.5);
            margin-top: 5rem;
            padding: 2rem;
            text-align: center;
            color: #64748b;
            font-size: 0.875rem;
            transition: border-color 0.3s ease, color 0.3s ease;
        }

        body.light-mode footer {
            border-top: 1px solid rgba(100, 116, 139, 0.2);
            color: #94a3b8;
        }

        svg {
            width: 1.25rem;
            height: 1.25rem;
            display: inline-block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .details-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 100;

            border-radius: 1rem;
            padding: 3rem;

        body.light-mode .close-btn:hover {

        }

            display: flex;

            gap: 2rem;

        .details-title-section h2 {

            margin-bottom: 0.5rem;

        }

        body.light-mode .details-title-section h2 {
            color: #1e293b;
        }

        .details-verdict-badge {
            padding: 0.75rem 1.5rem;
            font-weight: 900;
            letter-spacing: 0.05em;
            color: white;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            align-self: flex-start;
        }

        .details-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        body.light-mode .details-section {
            border-bottom: 1px solid rgba(100, 116, 139, 0.2);

        .details-section:last-child {

        .details-label {
            font-size: 0.875rem;

        .stat-item {
            background: rgba(30, 41, 59, 0.5);

        .stat-label {

        body.light-mode .stat-label {

            font-size: 1.5rem;

        body.light-mode .details-value {

                <div class="header-title">
                    <h1>GAME.WORTH</h1>
                    <span class="subtitle">honest game reviews</span>
                </div>

                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>

        const genres = ['all', 'Action RPG', 'RPG', 'Shooter', 'Action Adventure', 'Adventure', 'Hero Shooter'];
        const platforms = ['all', 'PC', 'PlayStation', 'Xbox', 'Nintendo', 'Mobile', 'Multi-Platform'];
        let selectedGenre = 'all';
        let selectedPlatform = 'all';
        let searchQuery = '';
        let sortBy = 'rating';

        function initializeFilters() {
            const filterContainer = document.getElementById('filterButtons');
            genres.forEach(genre => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (genre === 'all' ? ' active' : '');
                btn.textContent = genre === 'all' ? '◆ All Genres' : genre;
                btn.onclick = () => setGenre(genre);
                filterContainer.appendChild(btn);
            });
        }

        function initializePlatformFilters() {
            const platformContainer = document.getElementById('platformButtons');
            platforms.forEach(platform => {
                const btn = document.createElement('button');
                btn.className = 'platform-btn' + (platform === 'all' ? ' active' : '');
                btn.textContent = platform === 'all' ? '🎮 All Platforms' : platform;
                btn.onclick = () => setPlatform(platform);
                platformContainer.appendChild(btn);
            });
        }

        function setGenre(genre) {
            selectedGenre = genre;
            updateFilters();
            renderGames();
        }

        function setPlatform(platform) {
            selectedPlatform = platform;
            updatePlatformFilters();
            renderGames();
        }

        function setSortBy(sort) {
            sortBy = sort;
            const btns = document.querySelectorAll('.sort-btn');
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.closest('.sort-btn').classList.add('active');
            renderGames();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const themeBtn = document.querySelector('.theme-toggle');
            
            if (document.body.classList.contains('light-mode')) {
                themeBtn.innerHTML = '☀️ Light';
                localStorage.setItem('theme', 'light');
            } else {
                themeBtn.innerHTML = '🌙 Dark';
                localStorage.setItem('theme', 'dark');
            }
        }

        // Load saved theme preference on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            const themeBtn = document.querySelector('.theme-toggle');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                themeBtn.innerHTML = '☀️ Light';
            } else {
                themeBtn.innerHTML = '🌙 Dark';
            }
        });

        function updateFilters() {
            const btns = document.querySelectorAll('.filter-btn');
            btns.forEach((btn, idx) => {
                if (genres[idx] === selectedGenre) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function updatePlatformFilters() {
            const btns = document.querySelectorAll('.platform-btn');
            btns.forEach((btn, idx) => {
                if (platforms[idx] === selectedPlatform) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function getFilteredGames() {
            return games
                .filter(game => {
                    const matchesGenre = selectedGenre === 'all' || game.genre === selectedGenre;
                    const matchesPlatform = selectedPlatform === 'all' || game.platform.includes(selectedPlatform);
                    const matchesSearch = game.title.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesGenre && matchesPlatform && matchesSearch;
                })
                .sort((a, b) => {
                    if (sortBy === 'rating') return b.rating - a.rating;
                    if (sortBy === 'reviews') return b.reviews - a.reviews;
                    return 0;
                });
        }

        function getVerdictLabel(verdict) {
            if (verdict === 'worth') return '✓ WORTH IT';
            if (verdict === 'mixed') return '≈ MIXED';
            return '✗ SKIP IT';
        }

        function getVerdictClass(verdict) {
            if (verdict === 'worth') return 'verdict-worth';
            if (verdict === 'mixed') return 'verdict-mixed';
            return 'verdict-skip';
        }

        function openDetails(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game) return;

            const starCount = Math.floor(game.rating / 2);
            const starsHtml = [...Array(5)].map((_, i) => {
                const isFilled = i < starCount;
                return `<span class="star ${isFilled ? 'filled' : 'empty'}">★</span>`;
            }).join('');

            const tagsHtml = game.tags.map(tag => `<span class="detailed-tag">${tag}</span>`).join('');

            document.getElementById('detailsTitle').textContent = game.title;
            document.getElementById('detailsGenre').textContent = game.genre;
            document.getElementById('detailsPlatform').textContent = '📱 ' + game.platform;
            document.getElementById('detailsDescription').textContent = game.description;
            document.getElementById('detailsStars').innerHTML = starsHtml;
            document.getElementById('detailsRatingNumber').textContent = game.rating;
            document.getElementById('detailsReviewCount').textContent = game.reviews + ' reviews';
            document.getElementById('detailsPrice').textContent = game.price;
            document.getElementById('detailsTotalReviews').textContent = game.reviews.toLocaleString();
            document.getElementById('detailsTags').innerHTML = tagsHtml;

            const verdictBadge = document.getElementById('detailsVerdictBadge');
            verdictBadge.className = 'details-verdict-badge ' + getVerdictClass(game.verdict);
            verdictBadge.textContent = getVerdictLabel(game.verdict);

            // Generate buy links based on platform
            const buySection = document.getElementById('buySection');
            let buyLinksHtml = '<div style="width: 100%; padding-bottom: 1rem; border-bottom: 1px solid rgba(51, 65, 85, 0.5);"><div style="font-size: 0.875rem; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;">Buy Now</div></div>';
            
            const platform = game.platform.toLowerCase();
            const gameSearchQuery = `${game.title} game`;
            let links = [];

            // Add appropriate store links based on platform
            if (platform.includes('pc') || platform.includes('steam')) {
                links.push(`<a href="https://store.steampowered.com/search/?term=${encodeURIComponent(game.title)}" target="_blank" class="buy-btn buy-btn-steam">🎮 Steam</a>`);
            }
            if (platform.includes('playstation') || platform.includes('ps')) {
                links.push(`<a href="https://www.playstation.com/en-us/search/${encodeURIComponent(game.title)}" target="_blank" class="buy-btn buy-btn-playstation">🎮 PlayStation Store</a>`);
            }
            if (platform.includes('xbox')) {
                links.push(`<a href="https://www.xbox.com/en-US/search?q=${encodeURIComponent(game.title)}" target="_blank" class="buy-btn buy-btn-xbox">🎮 Xbox Store</a>`);
            }
            if (platform.includes('nintendo')) {
                links.push(`<a href="https://www.nintendo.com/search/?query=${encodeURIComponent(game.title)}" target="_blank" class="buy-btn buy-btn-nintendo">🎮 Nintendo eShop</a>`);
            }
            if (platform.includes('mobile') || platform.includes('ios') || platform.includes('android')) {
                links.push(`<a href="https://www.apple.com/app-store/" target="_blank" class="buy-btn buy-btn-appstore">🎮 App Store</a>`);
            }

            // Add Amazon as a backup option - using "game" in search query for better results
            if (links.length === 0) {
                links.push(`<a href="https://www.amazon.com/s?k=${encodeURIComponent(gameSearchQuery)}" target="_blank" class="buy-btn buy-btn-amazon">🛒 Buy on Amazon</a>`);
            } else {
                links.push(`<a href="https://www.amazon.com/s?k=${encodeURIComponent(gameSearchQuery)}" target="_blank" class="buy-btn buy-btn-amazon">🛒 Amazon</a>`);
            }

            buySection.innerHTML = buyLinksHtml + '<div style="display: flex; flex-wrap: wrap; gap: 1rem;">' + links.join('') + '</div>';

            document.getElementById('detailsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            document.getElementById('detailsModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside
        const setupModalListener = () => {
            const modal = document.getElementById('detailsModal');
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    closeDetails();
                }
            });
        }

        function renderGames() {
            const filtered = getFilteredGames();
            const grid = document.getElementById('gamesGrid');
            const noResults = document.getElementById('noResults');

            grid.innerHTML = '';

            if (filtered.length === 0) {
                noResults.style.display = 'block';
                return;
            }

            noResults.style.display = 'none';

            filtered.forEach((game, index) => {
                const starCount = Math.floor(game.rating / 2);
                const starsHtml = [...Array(5)].map((_, i) => {
                    const isFilled = i < starCount;
                    return `<span class="star ${isFilled ? 'filled' : 'empty'}">★</span>`;
                }).join('');

                const tagsHtml = game.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

                const card = document.createElement('div');
                card.className = `game-card delay-${(index % 10) + 1}`;
                card.style.cursor = 'pointer';
                card.onclick = () => openDetails(game.id);
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-content">
                            <div class="verdict-badge ${getVerdictClass(game.verdict)}">
                                ${getVerdictLabel(game.verdict)}
                            </div>
                            <h2 class="game-title">${game.title}</h2>
                            <p class="game-genre">${game.genre}</p>
                            <p class="game-platform">📱 ${game.platform}</p>
                            <p class="game-description">${game.description}</p>
                            <div class="tags">${tagsHtml}</div>
                            <div class="rating-row">
                                <div style="display: flex; align-items: center;">
                                    <div class="stars">${starsHtml}</div>
                                    <span class="rating-number">${game.rating}</span>
                                </div>
                                <span class="review-count">${game.reviews} reviews</span>
                            </div>
                            <div class="price-row">
                                <span class="price-label">Price</span>
                                <span class="price-value">${game.price}</span>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderGames();
        });

        // Scroll behavior to hide/show header
        const header = document.querySelector('header');
        const main = document.querySelector('main');

        // Set initial margin based on header height
        function updateMainMargin() {
            const headerHeight = header.offsetHeight;
            main.style.marginTop = (headerHeight + 30) + 'px';
        }

        updateMainMargin();
        window.addEventListener('resize', updateMainMargin);

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;

            if (scrollTop > 50) {
                // Scrolled down - hide header
                header.classList.add('hidden');
            } else {
                // At the very top - show header
                header.classList.remove('hidden');
            }
        });

        initializeFilters();
        initializePlatformFilters();
        setupModalListener();
        renderGames();
    </script>
